<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA-MALIVA VISTA HOTEL - A Taste of Paradise</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Using FullCalendar Scheduler for Resource Timeline View -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { background:#f8f9fa; font-family: Tahoma, sans-serif; font-size:13px; }
        .top-menu { background:#007bff; color:white; padding:5px 12px; font-size:13px; }
        .toolbar { background:#f0f0f0; border-bottom:1px solid #ddd; padding:6px; }
        .sidebar { background:#f8f9fa; border-right:1px solid #ddd; padding:12px; width:190px; }
        .main-content { border:1px solid #ddd; background:white; padding:12px; min-height:620px; }
        table, .fc { border:1px solid #ddd !important; }
        .fc .fc-col-header-cell { background:#e9ecef; font-weight:bold; }
        /* Fix for clicking issues: Ensure buttons are above other elements */
        button { position: relative; z-index: 10; cursor: pointer; }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .sidebar {
                display: none; /* Hide sidebar on small screens */
            }
            .toolbar {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .toolbar button {
                margin-bottom: 5px;
            }
            .top-menu {
                text-align: center;
            }
            .top-menu .float-end {
                float: none !important;
                display: block;
            }
            .main-content {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
<nav class="top-menu">
    <span class="d-none d-md-inline">File &nbsp;&nbsp; Tools &nbsp;&nbsp; View &nbsp;&nbsp; Help &nbsp;&nbsp;&nbsp;&nbsp;</span>
    <span class="float-end">www.lamalivavistahotel.com • A Taste of Paradise • Buea, Cameroon</span>
</nav>

<div class="toolbar">
    <button onclick="window.location.href='/dashboard'" class="btn btn-sm btn-light me-1"><i class="bi bi-house-door"></i> Dashboard</button>
    <button onclick="window.location.href='/calendar'" class="btn btn-sm btn-light me-1"><i class="bi bi-calendar3"></i> Calendar</button>
    <button onclick="window.location.href='/rooms'" class="btn btn-sm btn-light me-1"><i class="bi bi-door-open"></i> Rooms</button>
    <button onclick="window.location.href='/guests'" class="btn btn-sm btn-light me-1"><i class="bi bi-people"></i> Guests</button>
    <button onclick="window.location.href='/reservations'" class="btn btn-sm btn-light me-1"><i class="bi bi-list"></i> Reservations</button>
    <button onclick="window.location.href='/new_reservation'" class="btn btn-sm btn-primary"><i class="bi bi-plus-circle"></i> New Booking</button>
</div>

<div class="container-fluid mt-2">
    <div class="row">
        <!-- LEFT SIDEBAR -->
        <div class="col-md-auto sidebar d-none d-md-block">
            <h6 class="mb-3">Quick Actions</h6>
            <button class="btn btn-sm btn-outline-primary w-100 mb-2">Today's Arrivals</button>
            <button class="btn btn-sm btn-outline-primary w-100 mb-2">Departures</button>
            <button class="btn btn-sm btn-outline-success w-100">Occupancy Report</button>
            <hr>
            <small>Free Rooms: <span class="text-success fw-bold">3</span></small>
        </div>

        <!-- MAIN AREA -->
        <div class="col p-0">
            {% block content %}{% endblock %}
        </div>

        <!-- RIGHT PANEL (Statistics) -->
        <div class="col-md-auto d-none d-lg-block" style="width:270px; background:#f8f9fa; border-left:1px solid #ddd; padding:12px;">
            <h6>Hotel Statistics</h6>
            <!-- Changed ID to avoid conflict with dashboard chart -->
            <canvas id="sidebarChart" height="180"></canvas>
            <p class="text-center mt-2"><strong>Occupancy Today: 68%</strong></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Initialize Sidebar Chart safely
    document.addEventListener('DOMContentLoaded', function() {
        const ctx = document.getElementById('sidebarChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Occupied', 'Free'],
                    datasets: [{
                        data: [68, 32], // Default values for sidebar
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10 } }
                    }
                }
            });
        }
    });
</script>
</body>
</html>
