{% extends 'base.html' %}
{% block content %}
<div class="main-content">
    <h5>Reservation Calendar – LA-MALIVA VISTA HOTEL</h5>
    <div id="calendar" style="height:640px;"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    Promise.all([
        fetch('/api/rooms').then(r => r.json()),
        fetch('/api/reservations').then(r => r.json())
    ]).then(([resources, events]) => {
        var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'resourceTimelineDay',
            editable: true,
            resources: resources,
            events: events,
            resourceLabelText: 'Rooms',
            headerToolbar: {left: 'prev,next today', center: 'title', right: 'resourceTimelineDay,resourceTimelineWeek'},
            eventClick: function(info) {
                if (confirm('Open reservation details?')) {
                    window.location = '/invoice/' + info.event.id;
                }
            }
        });
        calendar.render();
    });
});
</script>
{% endblock %}
