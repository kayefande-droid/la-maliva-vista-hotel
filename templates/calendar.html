{% extends 'base.html' %}
{% block content %}
<style>
    .calendar-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 25px;
        border-radius: 8px;
        margin-bottom: 25px;
        animation: slideInDown 0.6s ease-out;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 6px 20px rgba(0, 82, 204, 0.3);
    }
    .calendar-container {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 250, 255, 0.9));
        border: 2px solid #ffb700;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(5px);
        animation: fadeIn 0.6s ease-out;
    }
    .fc {
        border: 2px solid #ffb700 !important;
        border-radius: 8px;
        overflow: hidden;
        animation: fadeIn 0.6s ease-out;
        background: white;
    }
    .fc .fc-button-primary {
        background-color: #0052cc !important;
        border-color: #003d99 !important;
        transition: all 0.3s ease;
        border-radius: 6px !important;
        font-weight: bold !important;
    }
    .fc .fc-button-primary:hover {
        background-color: #ffb700 !important;
        border-color: #ff9500 !important;
        color: #001a4d !important;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 183, 0, 0.4);
    }
    .fc .fc-button-primary.fc-button-active {
        background-color: #ffb700 !important;
        border-color: #ff9500 !important;
        color: #001a4d !important;
    }
    .fc .fc-col-header-cell {
        background: linear-gradient(90deg, #0052cc, #003d99) !important;
        color: white !important;
        font-weight: bold !important;
        border-color: #ffb700 !important;
        padding: 12px !important;
    }
    .fc .fc-timegrid-slot {
        height: 2.5em;
        border-color: rgba(0, 82, 204, 0.2) !important;
    }
    .fc .fc-resource-area {
        background: linear-gradient(180deg, rgba(0, 82, 204, 0.1), rgba(0, 82, 204, 0.05)) !important;
        border-right: 2px solid #ffb700 !important;
    }
    .fc .fc-resource-area header {
        background: linear-gradient(90deg, #ffb700, #ff9500) !important;
        color: #001a4d !important;
        font-weight: bold !important;
        padding: 10px !important;
    }
    .fc .fc-daygrid-day:hover {
        background: rgba(0, 82, 204, 0.08) !important;
    }
    .fc .fc-event {
        background: linear-gradient(135deg, #0052cc, #003d99) !important;
        border: 2px solid #ffb700 !important;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
        border-radius: 4px !important;
        font-weight: bold !important;
        color: white !important;
    }
    .fc .fc-event:hover {
        box-shadow: 0 8px 16px rgba(0, 82, 204, 0.4) !important;
        transform: scale(1.02);
    }
    .fc .fc-event-title {
        font-weight: bold !important;
        color: #ffb700 !important;
    }
    .fc .fc-resource {
        border-bottom: 1px solid rgba(0, 82, 204, 0.2) !important;
        padding: 8px !important;
    }
    .fc .fc-resource-title {
        font-weight: bold !important;
        color: #0052cc !important;
    }
    .calendar-loading {
        text-align: center;
        padding: 50px;
        color: #0052cc;
        font-size: 18px;
    }
    .calendar-loading i {
        font-size: 48px;
        color: #ffb700;
        animation: spin 2s linear infinite;
        margin-bottom: 20px;
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    @media (max-width: 768px) {
        .calendar-container {
            padding: 10px;
        }
        .fc {
            font-size: 12px;
        }
        .fc .fc-col-header-cell {
            padding: 8px !important;
        }
    }
</style>

<div class="main-content">
    <div class="calendar-header">
        <div>
            <h5 class="mb-0" style="font-size: 24px;"><i class="bi bi-calendar-range"></i> Reservation Calendar</h5>
            <small>LA-MALIVA VISTA HOTEL • Real-time Room Occupancy</small>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/1524/1524815.png" alt="Hotel Key" style="height: 40px; opacity: 0.8; animation: spin 20s linear infinite;">
    </div>

    <div class="calendar-container">
        <div id="calendar-loading" class="calendar-loading">
            <i class="bi bi-calendar-week"></i>
            <div>Loading Reservation Calendar...</div>
        </div>
        <div id="calendar" style="height: 700px; display: none;"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loadingDiv = document.getElementById('calendar-loading');
    const calendarDiv = document.getElementById('calendar');

    // Show loading initially
    loadingDiv.style.display = 'block';
    calendarDiv.style.display = 'none';

    // Fetch data and initialize calendar
    Promise.all([
        fetch('/api/rooms').then(r => r.json()).catch(err => {
            console.error('Error fetching rooms:', err);
            return [];
        }),
        fetch('/api/reservations').then(r => r.json()).catch(err => {
            console.error('Error fetching reservations:', err);
            return [];
        })
    ]).then(([resources, events]) => {
        // Hide loading, show calendar
        loadingDiv.style.display = 'none';
        calendarDiv.style.display = 'block';

        // Initialize FullCalendar
        var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'resourceTimelineDay',
            editable: true,
            resources: resources,
            events: events,
            resourceLabelText: 'Rooms',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'resourceTimelineDay,resourceTimelineWeek,resourceTimelineMonth'
            },
            eventClick: function(info) {
                if (confirm('Open reservation details?')) {
                    window.location = '/invoice/' + info.event.id;
                }
            },
            resourceAreaWidth: '200px',
            slotMinTime: '06:00:00',
            slotMaxTime: '24:00:00',
            height: 'auto',
            contentHeight: 600,
            aspectRatio: 1.8,
            eventDisplay: 'block',
            eventTimeFormat: {
                hour: '2-digit',
                minute: '2-digit',
                meridiem: false
            }
        });

        calendar.render();
    }).catch(error => {
        console.error('Calendar initialization error:', error);
        loadingDiv.innerHTML = '<i class="bi bi-exclamation-triangle" style="color: #dc3545;"></i><div style="color: #dc3545;">Error loading calendar. Please refresh the page.</div>';
    });
});
</script>
{% endblock %}
