{% extends 'base.html' %}
{% block content %}
<style>
    .edit-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        animation: slideInDown 0.6s ease-out;
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .edit-form {
        background: linear-gradient(135deg, rgba(0, 82, 204, 0.05), rgba(255, 183, 0, 0.05));
        border: 2px solid #ffb700;
        padding: 25px;
        border-radius: 8px;
        animation: slideInUp 0.6s ease-out;
    }
    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .form-label {
        color: #0052cc;
        font-weight: bold;
        margin-bottom: 8px;
    }
    .form-control, .form-select {
        border: 2px solid rgba(0, 82, 204, 0.3) !important;
        transition: all 0.3s ease;
    }
    .form-control:focus, .form-select:focus {
        border-color: #ffb700 !important;
        box-shadow: 0 0 10px rgba(255, 183, 0, 0.3) !important;
    }
    .btn-submit {
        background: linear-gradient(90deg, #0052cc, #003d99);
        border: none;
        color: white;
        font-weight: bold;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-submit:hover {
        background: linear-gradient(90deg, #ffb700, #ff9500);
        color: #001a4d;
        transform: translateY(-3px);
        box-shadow: 0 8px 16px rgba(0, 82, 204, 0.4);
    }
    .btn-cancel {
        background: linear-gradient(90deg, #6c757d, #5a6268);
        border: none;
        color: white;
        font-weight: bold;
        transition: all 0.3s ease;
    }
    .btn-cancel:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    .form-section {
        margin-bottom: 20px;
        animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }
    small {
        color: #666;
        display: block;
        margin-top: 5px;
    }
</style>

<div class="main-content">
    <div class="edit-header">
        <h5 class="mb-0" style="font-size: 24px;"><i class="bi bi-person-gear"></i> Edit User</h5>
        <small>Update user information and access privileges</small>
    </div>

    <div class="edit-form">
        <form method="POST">
            <div class="form-section">
                <label for="username" class="form-label"><i class="bi bi-person"></i> Username</label>
                <input type="text" class="form-control form-control-lg" id="username" name="username" value="{{ user.username }}" required>
            </div>

            <div class="form-section">
                <label for="email" class="form-label"><i class="bi bi-envelope"></i> Email</label>
                <input type="email" class="form-control form-control-lg" id="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-section">
                <label for="password" class="form-label"><i class="bi bi-key"></i> Password</label>
                <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="New Password">
                <small class="text-muted">Leave blank to keep current password</small>
            </div>

            <div class="form-section">
                <label for="role" class="form-label"><i class="bi bi-shield-lock"></i> Role</label>
                <select name="role" class="form-select form-select-lg" required>
                    <option value="user" {% if user.role == 'user' %}selected{% endif %} style="color: #666;">User (Limited Access)</option>
                    <option value="staff" {% if user.role == 'staff' %}selected{% endif %} style="color: #666;">Staff (Extended Access)</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %} style="color: #666;">Admin (Full Access)</option>
                </select>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <button type="submit" class="btn btn-submit btn-lg w-100"><i class="bi bi-check-circle"></i> Update User</button>
                </div>
                <div class="col-md-6">
                    <a href="{{ url_for('users') }}" class="btn btn-cancel btn-lg w-100"><i class="bi bi-x-circle"></i> Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
