{% extends 'base.html' %}
{% block content %}
<style>
    .guests-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        animation: slideInDown 0.6s ease-out;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .guests-table {
        border: 2px solid #ffb700 !important;
        border-radius: 8px;
        overflow: hidden;
        animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    .guests-table thead {
        background: linear-gradient(90deg, #0052cc, #003d99) !important;
        color: white;
        font-weight: bold;
    }
    .guests-table thead th {
        border-color: #ffb700 !important;
        padding: 15px;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.5px;
    }
    .guests-table tbody tr {
        border-bottom: 1px solid rgba(0, 82, 204, 0.2);
        transition: all 0.3s ease;
    }
    .guests-table tbody tr:hover {
        background: linear-gradient(90deg, rgba(0, 82, 204, 0.1), rgba(255, 183, 0, 0.05));
        box-shadow: inset 3px 0 0 #ffb700;
        transform: scale(1.01);
    }
    .guests-table tbody td {
        padding: 12px 15px;
        vertical-align: middle;
    }
    .guest-name {
        color: #0052cc;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .guest-contact {
        color: #666;
    }
    .table-responsive {
        animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="main-content">
    <div class="guests-header">
        <div>
            <h5 class="mb-0" style="font-size: 24px;"><i class="bi bi-people"></i> Guest Database</h5>
            <small>Manage and view all registered guests</small>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/1524/1524823.png" alt="Guest" style="height: 40px; opacity: 0.8;">
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-sm guests-table mb-0">
            <thead>
                <tr>
                    <th><i class="bi bi-person-fill"></i> Name</th>
                    <th><i class="bi bi-telephone-fill"></i> Phone</th>
                    <th><i class="bi bi-envelope-fill"></i> Email</th>
                </tr>
            </thead>
            <tbody>
                {% for g in guests %}
                <tr>
                    <td><span class="guest-name"><i class="bi bi-star"></i> {{ g.name }}</span></td>
                    <td><span class="guest-contact">{{ g.phone }}</span></td>
                    <td><span class="guest-contact">{{ g.email }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
