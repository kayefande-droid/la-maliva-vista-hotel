{% extends 'base.html' %}
{% block content %}
<style>
    .reservation-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 25px;
        border-radius: 8px;
        margin-bottom: 25px;
        animation: slideInDown 0.6s ease-out;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .reservation-form {
        background: linear-gradient(135deg, rgba(0, 82, 204, 0.05), rgba(255, 183, 0, 0.05));
        border: 2px solid #ffb700;
        padding: 25px;
        border-radius: 8px;
        animation: slideInUp 0.6s ease-out;
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .form-control, .form-select {
        border: 2px solid rgba(0, 82, 204, 0.3) !important;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    .form-control:focus, .form-select:focus {
        border-color: #ffb700 !important;
        box-shadow: 0 0 10px rgba(255, 183, 0, 0.3) !important;
        background: white;
    }
    .form-label {
        color: #0052cc;
        font-weight: bold;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .input-group {
        margin-bottom: 18px;
        animation: fadeIn 0.6s ease-out;
    }
    .input-group:nth-child(1) { animation-delay: 0.1s; }
    .input-group:nth-child(2) { animation-delay: 0.2s; }
    .input-group:nth-child(3) { animation-delay: 0.3s; }
    .input-group:nth-child(4) { animation-delay: 0.4s; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }
    .submit-btn {
        background: linear-gradient(90deg, #0052cc, #003d99);
        border: none;
        color: white;
        font-weight: bold;
        padding: 15px;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        border-radius: 6px;
        margin-top: 20px;
        font-size: 16px;
    }
    .submit-btn:hover {
        background: linear-gradient(90deg, #ffb700, #ff9500);
        color: #001a4d;
        transform: translateY(-3px);
        box-shadow: 0 8px 16px rgba(0, 82, 204, 0.4);
    }
    .form-section-title {
        color: #ffb700;
        font-weight: bold;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 20px;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #ffb700;
    }
    .icon-guest { color: #0052cc; }
    .icon-room { color: #ffb700; }
    .icon-date { color: #28a745; }
</style>

<div class="main-content">
    <div class="reservation-header">
        <div>
            <h5 class="mb-0" style="font-size: 24px;"><i class="bi bi-plus-circle"></i> New Reservation</h5>
            <small>Book a luxurious stay at LA-MALIVA VISTA HOTEL</small>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/1524/1524815.png" alt="Hotel Key" style="height: 40px; opacity: 0.8;">
    </div>

    <div class="reservation-form">
        <form method="POST">
            <!-- Guest Information -->
            <div class="form-section-title"><i class="bi bi-person"></i> Guest Information</div>

            <div class="input-group">
                <label for="name" class="form-label"><i class="bi bi-person-fill icon-guest"></i> Full Name</label>
                <input type="text" name="name" id="name" class="form-control form-control-lg" placeholder="Enter guest name" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="phone" class="form-label"><i class="bi bi-telephone-fill icon-guest"></i> Phone</label>
                        <input type="text" name="phone" id="phone" class="form-control form-control-lg" placeholder="Phone (+237)" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="email" class="form-label"><i class="bi bi-envelope-fill icon-guest"></i> Email</label>
                        <input type="email" name="email" id="email" class="form-control form-control-lg" placeholder="Email address" required>
                    </div>
                </div>
            </div>

            <!-- Room Selection -->
            <div class="form-section-title"><i class="bi bi-door-open"></i> Room Selection</div>

            <div class="input-group">
                <label for="room_id" class="form-label"><i class="bi bi-box-seam icon-room"></i> Choose Room</label>
                <select name="room_id" id="room_id" class="form-select form-select-lg" required>
                    <option value="">-- Select a room --</option>
                    {% for room in rooms %}
                    <option value="{{room.id}}">Room {{room.room_number}} - {{room.room_type}} (FCFA {{room.price}})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Check-in Details -->
            <div class="form-section-title"><i class="bi bi-box-arrow-down"></i> Check-in Details</div>

            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="check_in_date" class="form-label"><i class="bi bi-calendar-fill icon-date"></i> Date</label>
                        <input type="date" name="check_in_date" id="check_in_date" class="form-control form-control-lg" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="check_in_time" class="form-label"><i class="bi bi-clock-fill icon-date"></i> Time</label>
                        <input type="time" name="check_in_time" id="check_in_time" class="form-control form-control-lg" value="14:00" required>
                    </div>
                </div>
            </div>

            <!-- Check-out Details -->
            <div class="form-section-title"><i class="bi bi-box-arrow-up"></i> Check-out Details</div>

            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="check_out_date" class="form-label"><i class="bi bi-calendar-fill icon-date"></i> Date</label>
                        <input type="date" name="check_out_date" id="check_out_date" class="form-control form-control-lg" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <label for="check_out_time" class="form-label"><i class="bi bi-clock-fill icon-date"></i> Time</label>
                        <input type="time" name="check_out_time" id="check_out_time" class="form-control form-control-lg" value="12:00" required>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn submit-btn w-100">
                <i class="bi bi-check-circle"></i> Create Reservation
            </button>
        </form>
    </div>
</div>
{% endblock %}
