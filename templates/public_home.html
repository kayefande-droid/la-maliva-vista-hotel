<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>LA-MALIVA VISTA HOTEL - Book Now</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {background: linear-gradient(rgba(0,123,255,0.8), rgba(0,123,255,0.8)), url('https://source.unsplash.com/1600x900/?luxury-hotel-cameroon'); background-size:cover; color:white;}
    .logo {width:130px; height:130px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:52px; color:#007bff; margin:0 auto;}
</style>
</head>
<body class="text-center py-5">
    <div class="container">
        <div class="logo">LV</div>
        <h1 class="display-4 mt-3">LA-MALIVA VISTA HOTEL</h1>
        <p class="lead">A Taste of Paradise • Buea, Cameroon</p>
        <div class="row mt-5">
            {% for room in rooms %}
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Room {{room.room_number}} - {{room.room_type}}</h5>
                        <p class="text-success fw-bold">FCFA {{room.price}}/night</p>
                        <a href="#" class="btn btn-success">Book Instantly</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <p class="mt-4">Opposite Fako Heart Entrance, GRA Bokwaongo, Buea • (+237) 679-915-967</p>
    </div>
</body>
</html>
