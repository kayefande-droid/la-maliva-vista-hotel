{% extends 'base.html' %}
{% block content %}
<style>
    .rooms-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        animation: slideInDown 0.6s ease-out;
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .room-card {
        border: 2px solid #ffb700;
        border-radius: 8px;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        animation: fadeInScale 0.6s ease-out forwards;
        box-shadow: 0 4px 12px rgba(0, 82, 204, 0.15);
    }
    @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
    .room-card:nth-child(1) { animation-delay: 0.1s; }
    .room-card:nth-child(2) { animation-delay: 0.2s; }
    .room-card:nth-child(3) { animation-delay: 0.3s; }
    .room-card:nth-child(4) { animation-delay: 0.4s; }
    .room-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 24px rgba(255, 183, 0, 0.3);
    }
    .room-image {
        height: 200px;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }
    .room-image::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(0, 82, 204, 0.3), rgba(255, 183, 0, 0.2));
        z-index: 1;
    }
    .room-image::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        z-index: 1;
    }
    .room-image i {
        font-size: 48px;
        color: white;
        opacity: 0.8;
        z-index: 2;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        animation: imageFloat 4s ease-in-out infinite;
    }
    @keyframes imageFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
    }
    .room-status-available {
        background: linear-gradient(90deg, #28a745, #20c997);
        color: white;
    }
    .room-status-occupied {
        background: linear-gradient(90deg, #dc3545, #c82333);
        color: white;
    }
    .room-status-maintenance {
        background: linear-gradient(90deg, #ffc107, #ffb700);
        color: #001a4d;
    }
    .room-price {
        font-size: 20px;
        font-weight: bold;
        color: #ffb700;
    }
    .room-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }
    .btn-book {
        background: linear-gradient(90deg, #0052cc, #003d99);
        border: none;
        color: white;
        font-weight: bold;
        padding: 8px 16px;
        border-radius: 6px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-book:hover {
        background: linear-gradient(90deg, #ffb700, #ff9500);
        color: #001a4d;
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0, 82, 204, 0.4);
    }
    .btn-book:active {
        transform: scale(0.98);
    }
</style>

<div class="main-content">
    <div class="rooms-header">
        <h5 class="mb-0" style="font-size: 24px;"><i class="bi bi-door-open"></i> Rooms Management</h5>
        <small>Browse and manage all available hotel rooms</small>
    </div>

    <div class="row">
        {% for room in rooms %}
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="room-card">
                <div class="room-image" style="background-image: url('https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600&h=400&fit=crop&crop=entropy&cs=tinysrgb&q=80');">
                    <i class="bi bi-door-open"></i>
                </div>
                <div class="card-body" style="background: linear-gradient(135deg, rgba(0, 82, 204, 0.02), rgba(255, 183, 0, 0.02));">
                    <div class="position-relative">
                        <span class="badge room-badge {% if room.status == 'Available' %}room-status-available{% elif room.status == 'Occupied' %}room-status-occupied{% else %}room-status-maintenance{% endif %}">
                            {{ room.status }}
                        </span>
                        <h6 style="color: #0052cc; font-weight: bold;">Room {{ room.room_number }}</h6>
                        <p class="mb-2">
                            <i class="bi bi-box-seam" style="color: #ffb700;"></i>
                            <span style="color: #666;">{{ room.room_type }}</span>
                        </p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="room-price">FCFA {{ room.price }}</span>
                            <button onclick="bookRoom({{room.id}})" class="btn btn-sm btn-book">
                                <i class="bi bi-calendar-check"></i> Book
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    function bookRoom(roomId) {
        // Navigate to new reservation page with room pre-selected
        window.location.href = '/new_reservation?room_id=' + roomId;
    }
</script>
{% endblock %}
