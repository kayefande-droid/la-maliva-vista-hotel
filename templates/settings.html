{% extends 'base.html' %}
{% block content %}
<style>
    .settings-header {
        background: linear-gradient(135deg, #0052cc 0%, #003d99 50%, #ffb700 100%);
        color: white;
        padding: 25px;
        border-radius: 8px;
        margin-bottom: 25px;
        animation: slideInDown 0.6s ease-out;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 6px 20px rgba(0, 82, 204, 0.3);
    }
    @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .settings-form {
        background: linear-gradient(135deg, rgba(0, 82, 204, 0.05), rgba(255, 183, 0, 0.05));
        border: 2px solid #ffb700;
        padding: 30px;
        border-radius: 8px;
        animation: slideInUp 0.6s ease-out;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .form-section {
        margin-bottom: 20px;
        animation: fadeIn 0.6s ease-out;
    }
    .form-section:nth-child(1) { animation-delay: 0.1s; }
    .form-section:nth-child(2) { animation-delay: 0.2s; }
    .form-section:nth-child(3) { animation-delay: 0.3s; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }
    .form-label {
        color: #0052cc;
        font-weight: bold;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .form-control, .form-select {
        border: 2px solid rgba(0, 82, 204, 0.3) !important;
        transition: all 0.3s ease;
        font-size: 14px;
    }
    .form-control:focus, .form-select:focus {
        border-color: #ffb700 !important;
        box-shadow: 0 0 10px rgba(255, 183, 0, 0.3) !important;
        background: white;
    }
    .btn-submit {
        background: linear-gradient(90deg, #0052cc, #003d99);
        border: none;
        color: white;
        font-weight: bold;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        padding: 12px 30px;
    }
    .btn-submit:hover {
        background: linear-gradient(90deg, #ffb700, #ff9500);
        color: #001a4d;
        transform: translateY(-3px);
        box-shadow: 0 8px 16px rgba(0, 82, 204, 0.4);
    }
    .alert-success {
        background: linear-gradient(90deg, rgba(40, 167, 69, 0.1), rgba(255, 183, 0, 0.05)) !important;
        border: 2px solid #28a745 !important;
        color: #155724 !important;
    }
</style>

<div class="main-content">
    <div class="settings-header">
        <i class="bi bi-gear" style="font-size: 28px;"></i>
        <div>
            <h5 class="mb-0" style="font-size: 24px;">Hotel Settings</h5>
            <small>Manage hotel information and configuration</small>
        </div>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="settings-form">
        <form method="POST">
            <div class="form-section">
                <label for="name" class="form-label"><i class="bi bi-building"></i> Hotel Name</label>
                <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ hotel.name }}" required>
            </div>

            <div class="form-section">
                <label for="address" class="form-label"><i class="bi bi-geo-alt"></i> Address</label>
                <textarea class="form-control form-control-lg" id="address" name="address" rows="3" required style="resize: vertical;">{{ hotel.address }}</textarea>
            </div>

            <div class="form-section">
                <label for="tax_rate" class="form-label"><i class="bi bi-percent"></i> Tax Rate (%)</label>
                <input type="number" step="0.01" class="form-control form-control-lg" id="tax_rate" name="tax_rate" value="{{ hotel.tax_rate }}" required>
            </div>

            <button type="submit" class="btn btn-submit btn-lg w-100">
                <i class="bi bi-check-circle"></i> Save Settings
            </button>
        </form>
    </div>
</div>
{% endblock %}
