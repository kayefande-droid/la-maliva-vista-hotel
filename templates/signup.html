<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LA-MALIVA VISTA HOTEL</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* Glassmorphism 2.0 & Skeuomorphism Design */
        body {
            margin: 0;
            padding: 0;
            overflow-y: auto;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .slideshow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -1;
        }
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        /* High-quality hotel backgrounds from Unsplash */
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1920&auto=format&fit=crop'); }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1920&auto=format&fit=crop'); }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?q=80&w=1920&auto=format&fit=crop'); }
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1611892440504-42a792e24d32?q=80&w=1920&auto=format&fit=crop'); }
        .slide:nth-child(5) { background-image: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?q=80&w=1920&auto=format&fit=crop'); }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0, 26, 77, 0.6), rgba(0, 61, 153, 0.6));
            z-index: 0;
        }

        .signup-container {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Glassmorphism 2.0 Signup Card */
        .signup-card {
            background: rgba(255, 255, 255, 0.15); /* Transparent */
            backdrop-filter: blur(20px); /* Frosted glass */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            animation: cardEntrance 0.8s ease-out;
            text-align: center;
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hotel-icon {
            font-size: 48px;
            color: #ffb700;
            margin-bottom: 15px;
            animation: floatIcon 3s ease-in-out infinite;
            text-shadow: 0 2px 10px rgba(255, 183, 0, 0.3);
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h3 {
            color: #ffb700;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }
        .tagline {
            color: white;
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        /* Skeuomorphic Form Fields */
        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px !important;
            color: white !important;
            padding: 12px 20px !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2) !important;
            border-color: #ffb700 !important;
            box-shadow: 0 0 15px rgba(255, 183, 0, 0.4), inset 0 2px 4px rgba(0,0,0,0.2) !important;
            outline: none;
        }
        .form-floating label {
            color: rgba(255,255,255,0.8);
            padding-left: 20px;
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #ffb700;
        }

        /* Tactile Button */
        .btn-signup {
            background: linear-gradient(135deg, #ffb700 0%, #ff9500 100%);
            border: none;
            border-radius: 12px;
            color: #001a4d;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px !important;
            box-shadow: 0 6px 20px rgba(255, 183, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            margin-top: 10px;
        }
        .btn-signup:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(255, 183, 0, 0.5);
            background: linear-gradient(135deg, #ffc107 0%, #ffb700 100%);
        }
        .btn-signup:active {
            transform: translateY(0);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.3);
        }

        .login-link {
            color: white;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
            transition: opacity 0.3s;
            display: block;
            margin-top: 25px;
        }
        .login-link:hover {
            opacity: 1;
            color: #ffb700;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #dc3545;
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide active"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>

    <div class="signup-container">
        <div class="signup-card">
            <div class="hotel-icon">
                <i class="bi bi-building"></i>
            </div>

            <h3>La-Maliva Vista</h3>
            <p class="tagline">"A Taste of Paradise"</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-floating">
                    <input type="text" name="username" id="username" class="form-control" placeholder="Username" required>
                    <label for="username"><i class="bi bi-person"></i> Username</label>
                </div>

                <div class="form-floating">
                    <input type="email" name="email" id="email" class="form-control" placeholder="name@example.com" required>
                    <label for="email"><i class="bi bi-envelope"></i> Email address</label>
                </div>

                <div class="form-floating">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                    <label for="password"><i class="bi bi-key"></i> Password</label>
                </div>

                <button type="submit" class="btn btn-signup shadow-lg">
                    Create Staff Account
                </button>
            </form>

            <a href="{{ url_for('login') }}" class="login-link">
                <i class="bi bi-arrow-left"></i> Already have an account? <strong>Login</strong>
            </a>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
